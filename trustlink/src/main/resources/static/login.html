<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustLink Login</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Login to TrustLink</h2>
            <p class="page-subtitle">Enter your credentials to continue</p>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Enter email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Enter password">
            </div>

            <button class="btn btn-primary full-width" onclick="login()">Login</button>
            <p id="result" class="message"></p>

            <div class="demo-box">
                <strong>Demo Accounts</strong>
                <p>User: user@gmail.com / 1234</p>
                <p>Provider: provider@gmail.com / 1234</p>
                <p>Admin: admin@gmail.com / admin1234</p>
            </div>
        </div>
    </div>

    <script src="/auth.js"></script>
</body>
</html>
