<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TrustLink</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="page-subtitle">Register as a user to use TrustLink</p>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" type="text" placeholder="Enter full name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Enter email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Enter password">
            </div>

            <button class="btn btn-primary full-width" onclick="registerUser()">Register</button>

            <div style="margin-top:12px;">
                <button class="btn full-width" style="background:#e5e7eb;color:#111827;" onclick="goToLogin()">
                    Back to Login
                </button>
            </div>

            <p id="result" class="message"></p>
        </div>
    </div>

    <script>
        async function registerUser() {
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const result = document.getElementById("result");

            result.innerText = "";

            try {
                const response = await fetch("/users/add", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password,
                        role: "USER",
                        status: "ACTIVE"
                    })
                });

                if (!response.ok) {
                    const text = await response.text();
                    result.innerText = "Registration failed: " + text;
                    return;
                }

                result.style.color = "green";
                result.innerText = "Registration successful. Redirecting to login...";

                setTimeout(() => {
                    window.location.href = "/login.html";
                }, 1500);

            } catch (error) {
                console.error(error);
                result.innerText = "Error while registering";
            }
        }

        function goToLogin() {
            window.location.href = "/login.html";
        }
    </script>
</body>
</html>
