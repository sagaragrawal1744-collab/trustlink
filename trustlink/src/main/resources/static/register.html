<!DOCTYPE html>
<html>
<head>
    <title>Register - TrustLink</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body class="auth-body">

<div class="auth-container">
    <div class="auth-card">

        <h2>Create Account</h2>

        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <select id="role">
            <option value="USER">User</option>
            <option value="PROVIDER">Provider</option>
        </select>

        <button class="btn btn-primary full-width" onclick="register()">Register</button>

        <p id="msg"></p>

    </div>
</div>

<script>
async function register() {

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        role: document.getElementById("role").value,
        status: "ACTIVE"
    };

    const response = await fetch("http://localhost:8080/users/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    if (response.ok) {
        document.getElementById("msg").innerText = "Registered successfully!";
        window.location.href = "/login.html";
    } else {
        document.getElementById("msg").innerText = "Registration failed";
    }
}
</script>

</body>
</html>
