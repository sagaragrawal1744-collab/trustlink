<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard - TrustLink</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2>TrustLink</h2>
            <p>Provider Panel</p>
            <button onclick="logout()">Logout</button>
        </aside>

        <main class="main">
            <div class="topbar">
                <div>
                    <h1 class="page-title">Provider Dashboard</h1>
                    <p class="page-subtitle">Manage your assigned bookings professionally.</p>
                </div>
                <div class="topbar-right">
                    <span id="providerEmail"></span>
                </div>
            </div>

            <div class="card">
                <h3>My Assigned Bookings</h3>
                <div id="providerBookings"></div>
            </div>
        </main>
    </div>

    <script src="/provider.js"></script>
</body>
</html>
